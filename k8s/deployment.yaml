apiVersion: apps/v1
kind: Deployment
metadata:
  name: tickify-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tickify-backend
  template:
    metadata:
      labels:
        app: tickify-backend
    spec:
      serviceAccountName: tickify-sa

      containers:
        - name: backend
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1Gi"

          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: tickify-secret
                  key: ConnectionStrings__DefaultConnection

            - name: Jwt__IssuerSigningKey
              valueFrom:
                secretKeyRef:
                  name: tickify-secret
                  key: Jwt__IssuerSigningKey

            - name: Jwt__ValidIssuer
              valueFrom:
                secretKeyRef:
                  name: tickify-secret
                  key: Jwt__ValidIssuer

            - name: Jwt__ValidAudience
              valueFrom:
                secretKeyRef:
                  name: tickify-secret
                  key: Jwt__ValidAudience
