apiVersion: apps/v1
kind: Deployment
metadata:
  name: tickify-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tickify-backend
  template:
    metadata:
      labels:
        app: tickify-backend
    spec:
      serviceAccountName: tickify-sa

      containers:
        - name: backend
          image: 554422868760.dkr.ecr.eu-central-1.amazonaws.com/akos-tickify-backend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"

          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: tickify-secret
                  key: ConnectionStrings__DefaultConnection

            - name: Jwt__IssuerSigningKey
              valueFrom:
                secretKeyRef:
                  name: tickify-secret
                  key: Jwt__IssuerSigningKey

            - name: Jwt__ValidIssuer
              valueFrom:
                secretKeyRef:
                  name: tickify-secret
                  key: Jwt__ValidIssuer

            - name: Jwt__ValidAudience
              valueFrom:
                secretKeyRef:
                  name: tickify-secret
                  key: Jwt__ValidAudience

          volumeMounts:
            - name: uploads
              mountPath: /app/wwwroot/uploads

      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: tickify-pvc